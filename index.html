<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- When capturing for Figma, fix viewport to 1440×900 so both frames have consistent sizing -->
    <script>
      (function () {
        if (location.hash.includes('figmacapture')) {
          document.documentElement.style.cssText = 'width:1440px;height:900px;overflow:auto;';
          document.body.style.cssText = 'width:1440px;min-height:900px;height:900px;margin:0;overflow:auto;';
        }
      })();
    </script>
    <script>
      (function () {
        var key = 'shaderbox-theme-v1';
        var theme = 'dark';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark') theme = stored;
          else if (window.matchMedia('(prefers-color-scheme: light)').matches) theme = 'light';
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
    <title>ENS Warp&Weft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
